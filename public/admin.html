<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Voting App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      color: #666;
      font-size: 1em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-icon {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .stat-label {
      color: #666;
      font-size: 1em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .yes-votes {
      border-left: 5px solid #10b981;
    }

    .no-votes {
      border-left: 5px solid #ef4444;
    }

    .visitors {
      border-left: 5px solid #667eea;
    }

    .details-section {
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .vote-percentage {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .percentage-bar {
      flex: 1;
      height: 60px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
      font-weight: bold;
      color: white;
      transition: all 0.3s ease;
    }

    .percentage-bar.yes {
      background: #10b981;
    }

    .percentage-bar.no {
      background: #ef4444;
    }

    .votes-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .votes-table th {
      background: #f3f4f6;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e5e7eb;
    }

    .votes-table td {
      padding: 15px;
      border-bottom: 1px solid #e5e7eb;
      color: #666;
    }

    .votes-table tr:hover {
      background: #f9fafb;
    }

    .vote-badge {
      display: inline-block;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9em;
      text-transform: uppercase;
    }

    .vote-badge.yes {
      background: #d1fae5;
      color: #065f46;
    }

    .vote-badge.no {
      background: #fee2e2;
      color: #991b1b;
    }

    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .refresh-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 1.2em;
      padding: 50px;
    }

    .no-data {
      text-align: center;
      color: #666;
      padding: 30px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Admin Dashboard</h1>
      <p class="subtitle">Real-time voting statistics and visitor tracking</p>
    </div>

    <button class="refresh-btn" onclick="loadStats()">🔄 Refresh Data</button>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card visitors">
        <div class="stat-icon">👥</div>
        <div class="stat-value" id="totalVisitors">-</div>
        <div class="stat-label">Total Visitors</div>
      </div>

      <div class="stat-card yes-votes">
        <div class="stat-icon">👍</div>
        <div class="stat-value" id="yesVotes">-</div>
        <div class="stat-label">Yes Votes</div>
      </div>

      <div class="stat-card no-votes">
        <div class="stat-icon">👎</div>
        <div class="stat-value" id="noVotes">-</div>
        <div class="stat-label">No Votes</div>
      </div>
    </div>

    <div class="details-section">
      <h2>Vote Distribution</h2>
      <div class="vote-percentage" id="votePercentage">
        <div class="percentage-bar yes" id="yesPercentage">0%</div>
        <div class="percentage-bar no" id="noPercentage">0%</div>
      </div>

      <h2>Recent Votes</h2>
      <div id="votesTableContainer">
        <p class="no-data">No votes recorded yet</p>
      </div>
    </div>

    <a href="/" class="back-link">← Back to Voting Page</a>
  </div>

  <script>
    async function loadStats() {
      try {
        const response = await fetch('/api/admin/stats');
        const stats = await response.json();

        // Update stat cards
        document.getElementById('totalVisitors').textContent = stats.totalVisitors || 0;
        document.getElementById('yesVotes').textContent = stats.votes.yes || 0;
        document.getElementById('noVotes').textContent = stats.votes.no || 0;

        // Calculate and display percentages
        const totalVotes = stats.totalVotes || 0;
        if (totalVotes > 0) {
          const yesPercent = Math.round((stats.votes.yes / totalVotes) * 100);
          const noPercent = Math.round((stats.votes.no / totalVotes) * 100);

          document.getElementById('yesPercentage').textContent = `${yesPercent}% Yes`;
          document.getElementById('yesPercentage').style.flex = yesPercent;
          
          document.getElementById('noPercentage').textContent = `${noPercent}% No`;
          document.getElementById('noPercentage').style.flex = noPercent;
        } else {
          document.getElementById('yesPercentage').textContent = '0% Yes';
          document.getElementById('noPercentage').textContent = '0% No';
          document.getElementById('yesPercentage').style.flex = 1;
          document.getElementById('noPercentage').style.flex = 1;
        }

        // Display votes table
        if (stats.voteDetails && stats.voteDetails.length > 0) {
          const tableHTML = `
            <table class="votes-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Vote</th>
                  <th>First Voted</th>
                  <th>Last Updated</th>
                </tr>
              </thead>
              <tbody>
                ${stats.voteDetails.map((vote, index) => `
                  <tr>
                    <td>${index + 1}</td>
                    <td><span class="vote-badge ${vote.vote}">${vote.vote}</span></td>
                    <td>${new Date(vote.created_at).toLocaleString()}</td>
                    <td>${new Date(vote.updated_at).toLocaleString()}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
          document.getElementById('votesTableContainer').innerHTML = tableHTML;
        } else {
          document.getElementById('votesTableContainer').innerHTML = '<p class="no-data">No votes recorded yet</p>';
        }

      } catch (error) {
        console.error('Error loading stats:', error);
        alert('Error loading statistics. Please try again.');
      }
    }

    // Load stats on page load
    loadStats();

    // Auto-refresh every 30 seconds
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
